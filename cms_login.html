<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CMS Login - Student Affairs Office</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: #e0e7ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .login-logo {
            height: 70px;
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
        }

        .login-subtitle {
            font-family: 'Inter', sans-serif;
            color: #6b7280;
        }

        .form-label {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .form-control {
            height: 52px;
            border-radius: 12px;
        }

        .login-btn {
            background: #2563eb;
            border: none;
            height: 52px;
            border-radius: 12px;
            font-weight: 600;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .footer-text {
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="text-center mb-4">

            <img src="Assets/image.png" class="login-logo mb-3">

            <h2 class="login-title">
                CMS Login
            </h2>

            <p class="login-subtitle">
                Student Affairs Office, IIT Patna
            </p>

        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Password
                </label>

                <input type="password" class="form-control" placeholder="Enter password">
            </div>

            <div class="d-grid">
                <a href="cms.html" class="btn btn-primary login-btn d-flex align-items-center justify-content-center">

                    Login to CMS

                </a>
            </div>

        </form>

        <div class="text-center mt-4">

            <a href="#" class="text-decoration-none">
                Forgot Password?
            </a>

        </div>

        <hr>

        <div class="text-center footer-text">
            © 2025 Student Affairs Office, IIT Patna
        </div>

    </div>

</body>

</html>
